stages:
  - lint
  - build

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_DRIVER: overlay2
  RUNTIME_IMAGE: "$CI_REGISTRY_IMAGE/runtime"
  QUANTIZER_IMAGE: "$CI_REGISTRY_IMAGE/quantizer"

helm_lint:
  stage: lint
  image: alpine/helm:3.15.4
  script:
    - helm lint deploy/helm/rag-api
    - helm template rag-api deploy/helm/rag-api > /tmp/rag-api-rendered.yaml
  artifacts:
    paths:
      - /tmp/rag-api-rendered.yaml
    expire_in: 1 day
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

build_and_push_runtime:
  stage: build
  image: docker:27.1.1
  services:
    - name: docker:27.1.1-dind
      command: ["--tls=false"]
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build --target runtime -t "$RUNTIME_IMAGE:$CI_COMMIT_SHA" -t "$RUNTIME_IMAGE:$CI_COMMIT_REF_SLUG-latest" .
    - docker push "$RUNTIME_IMAGE:$CI_COMMIT_SHA"
    - docker push "$RUNTIME_IMAGE:$CI_COMMIT_REF_SLUG-latest"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

build_and_push_quantizer:
  stage: build
  image: docker:27.1.1
  services:
    - name: docker:27.1.1-dind
      command: ["--tls=false"]
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build --target quantizer -t "$QUANTIZER_IMAGE:$CI_COMMIT_SHA" -t "$QUANTIZER_IMAGE:$CI_COMMIT_REF_SLUG-latest" .
    - docker push "$QUANTIZER_IMAGE:$CI_COMMIT_SHA"
    - docker push "$QUANTIZER_IMAGE:$CI_COMMIT_REF_SLUG-latest"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
