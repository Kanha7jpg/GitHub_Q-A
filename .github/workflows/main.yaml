name: Main CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python sources compile
        run: python -m compileall app scripts

      - name: Lint Helm chart
        run: helm lint deploy/helm/rag-api

      - name: Render Helm chart
        run: helm template rag-api deploy/helm/rag-api > /tmp/rag-api-rendered.yaml

      - name: Upload rendered Helm manifest
        uses: actions/upload-artifact@v4
        with:
          name: rag-api-rendered
          path: /tmp/rag-api-rendered.yaml

  docker-build:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: false
          tags: rag-api-runtime:${{ github.sha }}

      - name: Build quantizer image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: quantizer
          push: false
          tags: rag-api-quantizer:${{ github.sha }}
